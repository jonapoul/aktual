name: PR

on:
  pull_request:

env:
  CI: true
  GRADLE_ENCRYPTION_KEY: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GITLEAKS_CONFIG: ./config/gitleaks.toml

permissions:
  contents: read
  pull-requests: write
  security-events: write

concurrency:
  group: 'ci-${{ github.event.merge_group.head_ref || github.head_ref }}-${{ github.workflow }}'
  cancel-in-progress: true

jobs:
  changed-files:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      renovate: ${{ steps.filter.outputs.renovate }}
      wrapper: ${{ steps.filter.outputs.wrapper }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          filters: |
            renovate:
              - '.github/renovate.json'
              - '.github/renovate.json5'
              - 'renovate.json'
              - 'renovate.json5'
            wrapper:
              - 'gradle/wrapper/**'
              - 'gradlew'
              - 'gradlew.bat'

  validate-renovate:
    needs: changed-files
    if: needs.changed-files.outputs.renovate == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 'lts/*'
      - run: npm install -g renovate
      - run: renovate-config-validator

  validate-wrapper:
    needs: changed-files
    if: needs.changed-files.outputs.wrapper == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: gradle/actions/wrapper-validation@0723195856401067f7a2779048b490ace7a47d7c # v5

  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2

  ktfmt:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-java
      - run: scripts/ktfmt.sh check --force

  validation:
    needs: [ changed-files, validate-renovate, validate-wrapper, gitleaks, ktfmt ]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more validation jobs failed or were cancelled"
            exit 1
          fi

  check-build-logic:
    needs: validation
    if: ${{ !cancelled() && needs.validation.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-java
      - uses: ./.github/actions/setup-gradle
      - uses: ./.github/actions/setup-gradle-properties
      - run: ./gradlew -p gradle/build-logic check
      - uses: ./.github/actions/report-build-results
        if: ${{ !cancelled() }}

  assemble-android:
    needs: validation
    if: ${{ !cancelled() && needs.validation.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-java
      - uses: ./.github/actions/setup-gradle
      - uses: ./.github/actions/setup-gradle-properties
      - run: ./gradlew :aktual-app:android:assembleDebug
      - uses: ./.github/actions/report-build-results
        if: ${{ !cancelled() }}

  assemble-desktop:
    needs: validation
    if: ${{ !cancelled() && needs.validation.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-java
      - uses: ./.github/actions/setup-gradle
      - uses: ./.github/actions/setup-gradle-properties
      - run: ./gradlew :aktual-app:desktop:assemble
      - uses: ./.github/actions/report-build-results
        if: ${{ !cancelled() }}

  detekt:
    needs: validation
    if: ${{ !cancelled() && needs.validation.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-java
      - uses: ./.github/actions/setup-gradle
      - uses: ./.github/actions/setup-gradle-properties
      - run: ./gradlew detektReportMergeSarif
      - uses: github/codeql-action/upload-sarif@38697555549f1db7851b81482ff19f1fa5c4fedc # v4
        if: ${{ !cancelled() }}
        with:
          sarif_file: build/reports/detekt/merge.sarif.json
      - uses: ./.github/actions/report-build-results
        if: ${{ !cancelled() }}

  tests:
    needs: validation
    if: ${{ !cancelled() && needs.validation.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-java
      - uses: ./.github/actions/setup-gradle
      - uses: ./.github/actions/setup-gradle-properties
      - run: ./gradlew testAll koverHtmlReport koverVerify -Pkover
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: ${{ !cancelled() }}
        with:
          name: kover-report
          path: build/reports/kover/html
      - uses: ./.github/actions/report-build-results
        if: ${{ !cancelled() }}

  licensee:
    needs: validation
    if: ${{ !cancelled() && needs.validation.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-java
      - uses: ./.github/actions/setup-gradle
      - uses: ./.github/actions/setup-gradle-properties
      - run: ./gradlew licensee

  finish:
    if: ${{ !cancelled() }}
    needs:
      - validation
      - check-build-logic
      - assemble-android
      - assemble-desktop
      - detekt
      - tests
      - licensee
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.check.outputs.result }}
    steps:
      - id: check
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "result=failure" >> "$GITHUB_OUTPUT"
            echo "One or more jobs failed or were cancelled"
            exit 1
          else
            echo "result=success" >> "$GITHUB_OUTPUT"
          fi

  claude-review:
    if: ${{ !cancelled() && !contains(github.head_ref, 'anthropics-claude-code-action') }}
    needs: finish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: anthropics/claude-code-action@ff9acae5886d41a99ed4ec14b7dc147d55834722 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: 'renovate'
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}
            CI RESULT: ${{ needs.finish.outputs.result || 'failure' }}

            You have two tasks:

            1. **CI Failure Analysis** (only if CI RESULT is "failure"):
               Use `gh run view ${{ github.run_id }} --json jobs` to inspect which jobs failed.
               For each failed job, use `gh run view ${{ github.run_id }} --log-failed` to get the failure logs.
               Identify the root cause and summarize it CONCISELY.

            2. **Code Review**:
               Use `gh pr diff $PR_NUMBER` to get the diff, then submit a review with inline comments on specific lines where you find:
               - Potential bugs or issues
               - Performance concerns
               - Security concerns
               - Missing test coverage

            Submit a review using:
               gh api repos/$REPO/pulls/$PR_NUMBER/reviews -f event=COMMENT -f body="Review summary" -f 'comments[][path]=file.kt' -f 'comments[][line]=42' -f 'comments[][body]=Your comment'

            Keep comments brief and actionable. Only comment where something should be addressed — don't leave praise or nitpicks. To clarify: if you have nothing to say besides "LGTM", **DO NOT LEAVE A COMMENT**

            If CI failed, include the failure analysis in the review summary. If everything looks fine and CI passed, leave a single approving comment via `gh pr comment`.

            Use the repository's CLAUDE.md for guidance on style and conventions.
          claude_args: '--allowed-tools "Bash(gh api:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*),Bash(gh run view:*)"'
