name: Setup Gradle
description: Set up Gradle with caching and encryption

runs:
  using: composite
  steps:
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@39e147cb9de83bb9910b8ef8bd7fff0ee20fcd6f # v6
      with:
        add-job-summary: on-failure
        cache-encryption-key: ${{ env.GRADLE_ENCRYPTION_KEY }}
