name: PR

on:
  pull_request:

env:
  CI: true
  GRADLE_ENCRYPTION_KEY: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

permissions:
  contents: read
  pull-requests: write
  security-events: write

concurrency:
  group: 'ci-${{ github.event.merge_group.head_ref || github.head_ref }}-${{ github.workflow }}'
  cancel-in-progress: true

jobs:
  changed-files:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      renovate: ${{ steps.filter.outputs.renovate }}
      wrapper: ${{ steps.filter.outputs.wrapper }}
      shell: ${{ steps.filter.outputs.shell }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4
        id: filter
        with:
          filters: |
            renovate:
              - '.github/renovate.json'
              - '.github/renovate.json5'
              - 'renovate.json'
              - 'renovate.json5'
            wrapper:
              - 'gradle/wrapper/**'
              - 'gradlew'
              - 'gradlew.bat'
            shell:
              - '**/*.sh'

  validate-renovate:
    needs: changed-files
    if: needs.changed-files.outputs.renovate == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 'lts/*'
      - run: npm install -g renovate
      - run: renovate-config-validator

  validate-wrapper:
    needs: changed-files
    if: needs.changed-files.outputs.wrapper == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

  shellcheck:
    needs: changed-files
    if: needs.changed-files.outputs.shell == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - run: shellcheck scripts/*.sh scripts/lib/*.sh

  betterleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: dortort/betterleaks-action@cd0b905aa4befb8f42f8b1ab98150180c9e77515 # v0.1.0
        id: betterleaks
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          config: ./config/betterleaks.toml
          fail-on-leak: 'true'
      - uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        if: always()
        with:
          sarif_file: ${{ steps.betterleaks.outputs.sarif-path }}

  ktfmt:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: ./.github/actions/setup-java
      - run: scripts/ktfmt.sh check --force

  validation:
    needs: [ changed-files, validate-renovate, validate-wrapper, shellcheck, betterleaks, ktfmt ]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more validation jobs failed or were cancelled"
            exit 1
          fi

  check-build-logic:
    needs: validation
    if: ${{ !cancelled() && needs.validation.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: ./.github/actions/setup-java
      - uses: ./.github/actions/setup-gradle
      - uses: ./.github/actions/setup-gradle-properties
      - run: ./gradlew -p build-logic check
      - uses: ./.github/actions/report-build-results
        if: ${{ !cancelled() }}

  assemble-android:
    needs: validation
    if: ${{ !cancelled() && needs.validation.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: ./.github/actions/setup-java
      - uses: ./.github/actions/setup-gradle
      - uses: ./.github/actions/setup-gradle-properties
      - run: ./gradlew :aktual-app:android:assembleDebug
      - uses: ./.github/actions/report-build-results
        if: ${{ !cancelled() }}

  assemble-desktop:
    needs: validation
    if: ${{ !cancelled() && needs.validation.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: ./.github/actions/setup-java
      - uses: ./.github/actions/setup-gradle
      - uses: ./.github/actions/setup-gradle-properties
      - run: ./gradlew :aktual-app:desktop:assemble
      - uses: ./.github/actions/report-build-results
        if: ${{ !cancelled() }}

  detekt:
    needs: validation
    if: ${{ !cancelled() && needs.validation.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-java
      - uses: ./.github/actions/setup-gradle
      - uses: ./.github/actions/setup-gradle-properties
      - run: ./scripts/detekt.sh origin/main
      - uses: ./.github/actions/report-build-results
        if: ${{ !cancelled() }}

  lint:
    needs: validation
    if: ${{ !cancelled() && needs.validation.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-java
      - uses: ./.github/actions/setup-gradle
      - uses: ./.github/actions/setup-gradle-properties
      - run: ./scripts/lint.sh origin/main
      - uses: ./.github/actions/report-build-results
        if: ${{ !cancelled() }}

  tests:
    needs: validation
    if: ${{ !cancelled() && needs.validation.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-java
      - uses: ./.github/actions/setup-gradle
      - uses: ./.github/actions/setup-gradle-properties
      - run: ./scripts/test.sh origin/main
      - uses: ./.github/actions/report-build-results
        if: ${{ !cancelled() }}

  other-checks:
    needs: validation
    if: ${{ !cancelled() && needs.validation.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: ./.github/actions/setup-java
      - uses: ./.github/actions/setup-gradle
      - uses: ./.github/actions/setup-gradle-properties
      - run: ./gradlew licensee androidManifestLock :aktual-core:l10n:catalog
      - run: ./scripts/unusedStrings.sh

  atlas:
    needs: validation
    if: ${{ !cancelled() && needs.validation.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - run: sudo apt-get update && sudo apt-get install -y graphviz
      - uses: ./.github/actions/setup-java
      - uses: ./.github/actions/setup-gradle
      - uses: ./.github/actions/setup-gradle-properties
      - run: ./gradlew atlasGenerate
      - name: Check for uncommitted changes
        run: |
          if ! git diff --exit-code; then
            echo "::error::atlasGenerate produced changes that were not committed. Please run './gradlew atlasGenerate' locally and commit the results."
            exit 1
          fi

  finish:
    if: ${{ !cancelled() }}
    needs:
      - validation
      - check-build-logic
      - assemble-android
      - assemble-desktop
      - detekt
      - lint
      - tests
      - other-checks
      - atlas
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.check.outputs.result }}
    steps:
      - id: check
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "result=failure" >> "$GITHUB_OUTPUT"
            echo "One or more jobs failed or were cancelled"
            exit 1
          else
            echo "result=success" >> "$GITHUB_OUTPUT"
          fi

  claude-review:
    needs: validation
    if: ${{ !cancelled() && needs.validation.result == 'success' && !startsWith(github.head_ref, 'renovate/') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: anthropics/claude-code-action@af0559ee4f514d1ef21826982bed13f7edc3c35e # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: 'renovate'
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            **Code Review**:
            Use `gh pr diff $PR_NUMBER` to get the diff, then submit a review with inline comments on specific lines where you find:
            - Potential bugs or issues
            - Performance concerns
            - Security concerns
            - Missing test coverage

            Submit a review using:
               gh api repos/$REPO/pulls/$PR_NUMBER/reviews -f event=COMMENT -f body="Review summary" -f 'comments[][path]=file.kt' -f 'comments[][line]=42' -f 'comments[][body]=Your comment'

            Keep comments brief and actionable.

            *IMPORTANT* Only leave a comment if something should be addressed — don't leave praise or nitpicks. To clarify: if you have nothing to say besides "LGTM", **DO NOT LEAVE A COMMENT AT ALL**

            Use the repository's CLAUDE.md for guidance on style and conventions.
          claude_args: '--allowed-tools "Bash(gh api:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*)"'
