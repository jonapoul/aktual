name: Claude Review

on:
  pull_request:
    types: [ opened, synchronize ]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    if: ${{ !contains(github.head_ref, 'anthropics-claude-code-action') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: anthropics/claude-code-action@1b422b3517b51140e4484faab676c5e68b914866 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: 'renovate'
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request. Use `gh api` to submit a pull request review with inline comments on specific lines of the diff where you find:
            - Potential bugs or issues
            - Performance concerns
            - Security concerns
            - Missing test coverage

            Use `gh pr diff $PR_NUMBER` to get the diff, then submit a review with inline comments using:
            gh api repos/$REPO/pulls/$PR_NUMBER/reviews -f event=COMMENT -f body="Review summary" -f 'comments[][path]=file.kt' -f 'comments[][line]=42' -f 'comments[][body]=Your comment'

            Keep comments brief and actionable. Only comment where something should be addressed — don't leave praise or nitpicks. If everything looks fine, leave a single approving comment via `gh pr comment`.

            Use the repository's CLAUDE.md for guidance on style and conventions.
          claude_args: '--allowed-tools "Bash(gh api:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*)"'

