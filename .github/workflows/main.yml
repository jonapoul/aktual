name: Main

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write
  checks: write

concurrency:
  group: 'ci-${{ github.event.merge_group.head_ref || github.head_ref }}-${{ github.workflow }}'
  cancel-in-progress: true

env:
  GRADLE_ENCRYPTION_KEY: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ github.head_ref }}
      - uses: ./.github/actions/setup-java
      - uses: ./.github/actions/setup-gradle
      - uses: ./.github/actions/setup-gradle-properties
      - run: ./gradlew testAll koverXmlReport koverVerify -Pkover

      - shell: bash
        run: |
          REPORT=build/reports/kover/report.xml
          COVERAGE=$(tail -6 "$REPORT" \
            | grep 'type="LINE"' \
            | sed -E 's/.*missed="([0-9]+)".*covered="([0-9]+)".*/\1 \2/' \
            | awk '{printf "%.1f", $2 * 100 / ($1 + $2)}')
          echo "COVERAGE=$COVERAGE" >> $GITHUB_ENV

      - uses: schneegans/dynamic-badges-action@28b0fa8bdeb46170ac397105ece0c1fe58f68910 # v1.9.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: 6bf1b7a292bc61bcca966bee22e8b456
          filename: coverage-badge.json
          label: coverage
          message: ${{ env.COVERAGE }}%
          valColorRange: ${{ env.COVERAGE }}
          minColorRange: 0
          maxColorRange: 100

      - uses: ./.github/actions/report-build-results
        if: ${{ !cancelled() }}
