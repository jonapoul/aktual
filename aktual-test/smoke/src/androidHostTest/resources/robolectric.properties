# Configured here instead of @Config to work around a Kotlin compiler crash caused by Burst's @InterceptTest
# generating annotation implementations for @Config's Class<?> properties.
application=aktual.app.android.AktualApplication

# needed by MetroAppComponentFactory
minSdk=28
# Must stay at 28 - on 29+ Robolectric creates providers/receivers before Application.onCreate(), so Metro's
# appComponentFactoryBindings isn't initialized yet. See https://github.com/ZacSweers/metro/issues/1979
maxSdk=28
