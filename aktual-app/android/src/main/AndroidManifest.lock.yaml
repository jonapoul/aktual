main:
  minSDK: 28
  targetSDK: 37
  permissions:
  - android.permission.ACCESS_NETWORK_STATE
  - android.permission.INTERNET
  libraries:
  - androidx.window.extensions:
      required: false
  - androidx.window.sidecar:
      required: false
  nativeLibraries:
  - libandroidx.graphics.path:
      requiredBy: androidx.graphics:graphics-path
      abis:
      - arm64-v8a
      - armeabi-v7a
      - x86
      - x86_64
  - libdatastore_shared_counter:
      requiredBy: androidx.datastore:datastore-core-android
      abis:
      - arm64-v8a
      - armeabi-v7a
      - x86
      - x86_64
  - libsqliteJni:
      requiredBy: androidx.sqlite:sqlite-bundled-android
      abis:
      - arm64-v8a
      - armeabi-v7a
      - x86
      - x86_64
  exports:
    activity:
    - aktual.app.android.AktualActivity
    - androidx.compose.ui.tooling.PreviewActivity
    receiver:
    - androidx.profileinstaller.ProfileInstallReceiver
variants:
  debug:
    namespace: dev.jonpoulton.aktual.app.dev
    permissions:
    - android.permission.POST_NOTIFICATIONS
    - android.permission.READ_EXTERNAL_STORAGE
    - android.permission.WRITE_EXTERNAL_STORAGE
    - dev.jonpoulton.aktual.app.dev.DYNAMIC_RECEIVER_NOT_EXPORTED_PERMISSION
    exports:
      activity:
      - leakcanary.internal.activity.LeakActivity
      activity-alias:
      - leakcanary.internal.activity.LeakLauncherActivity
  release:
    namespace: dev.jonpoulton.aktual.app
    permissions:
    - dev.jonpoulton.aktual.app.DYNAMIC_RECEIVER_NOT_EXPORTED_PERMISSION
fingerprint: be3ea39f51dec81588ac87d1e940d43b
